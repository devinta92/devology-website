<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Halaman Tidak Ditemukan | Devology Technology</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800;900&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --c-primary:   #0052FF;
      --c-secondary: #5E72C3;
      --c-tertiary:  #BF3003;
      --c-bg:        #0A0A0A;
      --c-border:    rgba(255,255,255,0.07);
      --c-text:      #FFFFFF;
      --c-muted:     rgba(255,255,255,0.45);
    }

    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 40px 24px;
    }

    /* Grid background */
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,82,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,82,255,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 80%);
      pointer-events: none;
    }

    /* Glow blobs */
    .glow {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      filter: blur(80px);
    }
    .glow--blue {
      width: 500px; height: 500px;
      background: rgba(0,82,255,0.08);
      top: -150px; left: -100px;
    }
    .glow--red {
      width: 400px; height: 400px;
      background: rgba(191,48,3,0.07);
      bottom: -100px; right: -80px;
    }

    /* Content */
    .content {
      position: relative; z-index: 1;
      text-align: center;
      max-width: 560px;
    }

    /* 404 big number */
    .error-code {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(120px, 20vw, 200px);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.05em;
      background: linear-gradient(135deg, var(--c-primary) 0%, var(--c-secondary) 60%, transparent 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      animation: flicker 4s ease-in-out infinite;
    }

    @keyframes flicker {
      0%, 90%, 100% { opacity: 1; }
      92% { opacity: 0.6; }
      94% { opacity: 1; }
      96% { opacity: 0.4; }
      98% { opacity: 1; }
    }

    /* Circuit line decoration */
    .circuit {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      margin-bottom: 32px;
    }

    .circuit-line {
      height: 1px;
      width: 60px;
      background: linear-gradient(90deg, transparent, var(--c-primary));
    }
    .circuit-line:last-child {
      background: linear-gradient(90deg, var(--c-primary), transparent);
    }
    .circuit-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--c-primary);
      margin: 0 8px;
      box-shadow: 0 0 12px var(--c-primary);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 8px var(--c-primary); }
      50% { box-shadow: 0 0 20px var(--c-primary), 0 0 40px rgba(0,82,255,0.3); }
    }

    h1 {
      font-family: 'Manrope', sans-serif;
      font-size: clamp(24px, 4vw, 36px);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    p {
      font-size: 16px;
      color: var(--c-muted);
      line-height: 1.7;
      margin-bottom: 40px;
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      border: none;
    }

    .btn--primary {
      background: var(--c-primary);
      color: #fff;
    }
    .btn--primary:hover {
      background: #0040D8;
      transform: translateY(-2px);
      box-shadow: 0 0 32px rgba(0,82,255,0.3);
    }

    .btn--ghost {
      background: rgba(255,255,255,0.05);
      color: var(--c-text);
      border: 1px solid var(--c-border);
    }
    .btn--ghost:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-2px);
    }

    /* Logo at top */
    .logo-wrap {
      position: fixed;
      top: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
    }
    .logo-wrap img {
      height: 48px;
      width: auto;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(191,48,3,0.1);
      border: 1px solid rgba(191,48,3,0.25);
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #ff6040;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #ff6040;
      animation: pulse-red 2s ease infinite;
    }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,96,64,0.5); }
      50% { box-shadow: 0 0 0 5px rgba(255,96,64,0); }
    }

    /* Countdown */
    .redirect-note {
      margin-top: 32px;
      font-size: 13px;
      color: rgba(255,255,255,0.25);
    }
    #countdown {
      color: var(--c-primary);
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="grid-bg"></div>
  <div class="glow glow--blue"></div>
  <div class="glow glow--red"></div>

  <a class="logo-wrap" href="/">
    <img src="brand_assets/devology.png" alt="Devology Technology" />
  </a>

  <div class="content">
    <div class="status-badge">
      <div class="status-dot"></div>
      Error 404
    </div>

    <div class="error-code">404</div>

    <div class="circuit">
      <div class="circuit-line"></div>
      <div class="circuit-dot"></div>
      <div class="circuit-line"></div>
    </div>

    <h1>Halaman Tidak Ditemukan</h1>
    <p>
      Sepertinya halaman yang kamu cari sudah dipindahkan, dihapus,<br />
      atau mungkin URL-nya salah ketik. Tenang, kami masih ada!
    </p>

    <div class="btn-group">
      <a href="/" class="btn btn--primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>
        Kembali ke Beranda
      </a>
      <a href="https://wa.me/6281219215091?text=Halo%20Devology%2C%20saya%20butuh%20bantuan." class="btn btn--ghost" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
        Hubungi Kami
      </a>
    </div>

    <p class="redirect-note">
      Otomatis redirect ke beranda dalam <span id="countdown">10</span> detik
    </p>
  </div>

  <script>
    let count = 10;
    const el = document.getElementById('countdown');
    const timer = setInterval(() => {
      count--;
      el.textContent = count;
      if (count <= 0) {
        clearInterval(timer);
        window.location.href = '/';
      }
    }, 1000);
  </script>
</body>
</html>
